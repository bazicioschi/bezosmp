name: Build and Deploy Lovable App

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build React App
        run: npm run build

      - name: Create Routing File for InfinityFree
        run: |
          echo 'RewriteEngine On' > dist/.htaccess
          echo 'RewriteCond %{REQUEST_FILENAME} !-f' >> dist/.htaccess
          echo 'RewriteCond %{REQUEST_FILENAME} !-d' >> dist/.htaccess
          echo 'RewriteRule ^(.*)$ index.html [L]' >> dist/.htaccess

      - name: Upload to InfinityFree Subdomain
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ./htdocs/


